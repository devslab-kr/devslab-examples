# Keeps every standalone Gradle demo in this repo up to date with the
# Spring Boot ecosystem and the devslab-kr starters they showcase.
#
# Each demo is an independent Gradle project (its own settings.gradle.kts and
# wrapper), so Dependabot needs to be told about each directory explicitly.
# Demos are split into two gradle entries based on which starter release line
# they showcase — they get different Spring-major policies.

version: 2

updates:
  # ---------------------------------------------------------------------
  # Spring Boot 3 demos — pinned to the SB3 starter line.
  #
  # easy-paging 0.4.x and ssrf-guard 3.x are certified against
  # Spring Boot 3.3-3.5. Letting Dependabot land a Spring Boot major
  # (3.x → 4.x) here would silently advertise an incompatible
  # combination to anyone copying one of these demos.
  #
  # When a given starter publishes its own SB4-compatible line (as
  # easy-paging did with 0.5.x), the SB4 demos live under the second
  # gradle entry below; the SB3 demos here keep getting patches on
  # the 3.5.x line.
  # ---------------------------------------------------------------------
  - package-ecosystem: "gradle"
    directories:
      - "/easy-paging-demo"
      - "/easy-paging-keyset-demo"
      - "/easy-paging-postgres-demo"
      - "/easy-paging-reactive-demo"
      - "/ssrf-guard-demo"
      - "/ssrf-guard-springai-demo"
      - "/ssrf-guard-feign-demo"
      - "/ssrf-guard-jdkhttp-demo"
      - "/ssrf-guard-okhttp-demo"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "sb3"
    commit-message:
      prefix: "build"
      include: "scope"
    ignore:
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "io.spring.dependency-management"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.springframework:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.springframework.cloud:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "gradle"
        update-types: ["version-update:semver-major"]
      # devslab-kr libraries follow the Spring-major-aligned versioning
      # policy: library major matches the Spring Boot major it targets
      # (https://github.com/devslab-kr/.github/blob/main/.github/VERSIONING.md).
      # So `semver-major` does the right thing for the SB3 demos here:
      # easy-paging 3.x stays on 3.x, ssrf-guard 3.x stays on 3.x. A
      # future easy-paging 4.x / ssrf-guard 4.x release (SB4) is a
      # major bump and gets held — exactly the behaviour we want for
      # SB3-pinned demos.
      #
      # (Pre-renumber, easy-paging was on 0.4.x / 0.5.x and Dependabot
      # read 0.4 → 0.5 as a *minor*, sneaking past the major ignore
      # — see PR #50, 2026-05-23. The renumber to aligned majors made
      # the explicit `versions: [">= 0.5"]` filter unnecessary.)
      - dependency-name: "kr.devslab:easy-paging-spring-boot-starter"
        update-types: ["version-update:semver-major"]
      - dependency-name: "kr.devslab:easy-paging-spring-boot-starter-reactive"
        update-types: ["version-update:semver-major"]
      - dependency-name: "kr.devslab:ssrf-guard"
        update-types: ["version-update:semver-major"]
      - dependency-name: "kr.devslab:ssrf-guard-*"
        update-types: ["version-update:semver-major"]
    groups:
      easy-paging:
        patterns:
          - "kr.devslab:easy-paging*"
      ssrf-guard:
        patterns:
          - "kr.devslab:ssrf-guard*"
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
          - "io.spring.dependency-management"
      test-tooling:
        patterns:
          - "org.testcontainers:*"
          - "org.springframework.boot:spring-boot-testcontainers"
          - "io.projectreactor:reactor-test"
          - "org.junit*:*"
      database-drivers:
        patterns:
          - "org.postgresql:*"
          - "com.h2database:h2"
          - "io.r2dbc:*"

  # ---------------------------------------------------------------------
  # Spring Boot 4 demos — easy-paging 0.5.x active line.
  #
  # These showcase the SB4-certified starter line, so Spring majors
  # are NOT held — Dependabot is free to roll the BOM through patch /
  # minor / major within the SB4 family. A future SB5 jump would
  # come back through here as a major bump on a dedicated PR (the
  # group keeps everything atomic).
  # ---------------------------------------------------------------------
  - package-ecosystem: "gradle"
    directories:
      - "/easy-paging-sb4-demo"
      - "/easy-paging-sb4-keyset-demo"
      - "/easy-paging-sb4-postgres-demo"
      - "/easy-paging-sb4-reactive-demo"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "sb4"
    commit-message:
      prefix: "build"
      include: "scope"
    # Still hold the Gradle wrapper major — has nothing to do with SB,
    # and a wrapper major needs hand verification regardless of line.
    ignore:
      - dependency-name: "gradle"
        update-types: ["version-update:semver-major"]
    groups:
      easy-paging:
        patterns:
          - "kr.devslab:easy-paging*"
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
          - "io.spring.dependency-management"
      test-tooling:
        patterns:
          - "org.testcontainers:*"
          - "org.springframework.boot:spring-boot-testcontainers"
          - "io.projectreactor:reactor-test"
          - "org.junit*:*"
      database-drivers:
        patterns:
          - "org.postgresql:*"
          - "com.h2database:h2"
          - "io.r2dbc:*"

  # ---------------------------------------------------------------------
  # GitHub Actions workflows used by the CI in .github/workflows.
  # ---------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
