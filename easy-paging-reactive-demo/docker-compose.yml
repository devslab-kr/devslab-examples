# Same shape as easy-paging-postgres-demo/docker-compose.yml — local "run it
# yourself" path; the test suite uses Testcontainers, not this compose file.
#
#   docker compose up -d db
#   ./gradlew bootRun

services:
  db:
    image: postgres:16-alpine
    container_name: easy-paging-reactive-demo-db
    environment:
      POSTGRES_DB: easypaging
      POSTGRES_USER: easypaging
      POSTGRES_PASSWORD: easypaging
    ports:
      # Different host port than the postgres demo so both demos can run side by side.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easypaging -d easypaging"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
