spring:
  application:
    name: api-log-r2dbc-demo

  # R2DBC connection — non-blocking driver, separate config namespace from
  # spring.datasource. Spring Boot auto-builds a ConnectionFactory from this.
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/apilog
    username: apilog
    password: apilog

api:
  log:
    enabled: true
    r2dbc:
      # ApiLogR2dbcSchemaInitializer creates the api_log table on boot. This
      # is the R2DBC-flavoured equivalent of api.log.schema.management=BUILTIN
      # (which only applies to the JPA / MyBatis backends — R2DBC has its own
      # property because the underlying mechanism is different).
      schema:
        enabled: true

server:
  port: 8080

# Self-loopback — the same app exposes both /upstream/widgets (the responder)
# and /client/widgets (the caller via ReactiveApiClientUtil). ClientController
# builds the URL from `local.server.port` at request time (Spring Boot sets it
# after the embedded server binds), so the demo works the same on bootRun (port
# 8080) and in RANDOM_PORT integration tests. In a real app, replace
# ClientController to point at the external service.

logging:
  level:
    root: WARN
    kr.devslab.examples: INFO
    kr.devslab.apilog: INFO
