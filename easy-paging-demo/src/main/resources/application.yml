# Self-contained demo config: H2 in-memory + MyBatis + easy-paging defaults.

spring:
  application:
    name: easy-paging-demo

  datasource:
    url: jdbc:h2:mem:easypagingdemo;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # schema.sql + data.sql are auto-applied on startup for embedded databases,
  # but we make it explicit so the behavior survives a switch to a non-embedded DB.
  sql:
    init:
      mode: always

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# Demo only — adjust caps for your own app.
easy-paging:
  enabled: true
  default-page-size: 10
  max-page-size: 100

# Tighten startup logging so the curl examples in the README stand out.
logging:
  level:
    root: WARN
    kr.devslab.examples: INFO
